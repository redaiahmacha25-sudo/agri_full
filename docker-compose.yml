version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: agriconnect_db
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: agriconnect
      MYSQL_USER: agriconnect_user
      MYSQL_PASSWORD: agriconnect_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agriconnect_api
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: agriconnect_user
      DB_PASSWORD: agriconnect_pass
      DB_NAME: agriconnect
      JWT_SECRET: agriconnect_super_secret_jwt_key_2024
      PORT: 5000
      CORS_ORIGIN: http://localhost:5500
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app/backend
      - /app/backend/node_modules
    command: npm run dev

volumes:
  mysql_data:
    driver: local
    
